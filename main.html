<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Peaches &amp; Cream Core</title>
<link rel="stylesheet" href="main.css"/>
</head>
<body>
<div class="shell">
  <div class="popup" id="popup">
    <div class="topbar" id="topbar">
      <div id="topbar-left"></div>
      <div id="topbar-center"></div>
      <div id="topbar-right"></div>
    </div>
    <div class="hdivider"></div>
    <div class="scroll-area" id="scroll-area"></div>
  </div>
</div>
<div class="save-toast" id="save-toast"></div>
<div class="modal-overlay" id="modal-overlay">
  <div class="modal" id="modal">
    <div class="modal-title" id="modal-title"></div>
    <div class="modal-desc" id="modal-desc"></div>
    <div class="modal-btns">
      <button class="modal-btn cancel" id="modal-cancel">취소</button>
      <button class="modal-btn confirm" id="modal-confirm">확인</button>
    </div>
  </div>
</div>
<script src="main.js"></script>
</body>
</html>
